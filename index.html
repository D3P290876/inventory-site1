<!DOCTYPE html>
<html>
<head>
<title>Game Inventory</title>
</head>
<body>

<h1>Shared Inventory</h1>

<div>
Gold: <span id="gold">0</span>
<button onclick="addGold()">+</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvmUNwm6ggtIME72gQdq33Re0A5mgdVbc",
  authDomain: "top-gs-inv.firebaseapp.com",
  databaseURL: "https://top-gs-inv-default-rtdb.firebaseio.com/",
  projectId: "top-gs-inv"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const goldRef = ref(db, "inventory/gold");

onValue(goldRef, (snapshot) => {
  document.getElementById("gold").innerText = snapshot.val() || 0;
});

window.addGold = function() {
  onValue(goldRef, (snapshot) => {
    const current = snapshot.val() || 0;
    set(goldRef, current + 1);
  }, {onlyOnce:true});
}

</script>

</body>
</html>
